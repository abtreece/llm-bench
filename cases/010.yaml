id: '010'
title: round_to_minor_units default rounding mode is wrong
difficulty: subtle
category: coding
grading: pytest
target_file: app/money.py
prompt: |-
  The test in tests/test_010_default_rounding_mode.py is failing. Read the failing test, identify the function in app/money.py responsible, and produce a corrected app/money.py. Do not modify the test.
breaking_patch: "--- a/app/money.py\n+++ b/app/money.py\n@@ -85,7 +85,7 @@\n     return\
  \ int(scaled)\n \n \n-def round_to_minor_units(m: Money, rounding: str = ROUND_HALF_EVEN)\
  \ -> Money:\n+def round_to_minor_units(m: Money, rounding: str = \"ROUND_HALF_UP\"\
  ) -> Money:\n     \"\"\"Quantize the amount to the currency's minor units using\
  \ banker's rounding by default.\"\"\"\n     return Money(m.amount.quantize(_quantum(m.currency),\
  \ rounding=rounding), m.currency)\n \n"
test_patch: |
  --- /dev/null
  +++ b/tests/test_010_default_rounding_mode.py
  @@ -0,0 +1,10 @@
  +from decimal import Decimal
  +from app.money import Money, round_to_minor_units
  +
  +
  +def test_round_two_and_a_half_tenths():
  +    assert round_to_minor_units(Money(Decimal("0.025"), "USD")).amount == Decimal("0.02")
  +
  +
  +def test_round_half_a_tenth():
  +    assert round_to_minor_units(Money(Decimal("0.005"), "USD")).amount == Decimal("0.00")
reference_patch: "--- a/app/money.py\n+++ b/app/money.py\n@@ -85,7 +85,7 @@\n    \
  \ return int(scaled)\n \n \n-def round_to_minor_units(m: Money, rounding: str =\
  \ \"ROUND_HALF_UP\") -> Money:\n+def round_to_minor_units(m: Money, rounding: str\
  \ = ROUND_HALF_EVEN) -> Money:\n     \"\"\"Quantize the amount to the currency's\
  \ minor units using banker's rounding by default.\"\"\"\n     return Money(m.amount.quantize(_quantum(m.currency),\
  \ rounding=rounding), m.currency)\n \n"
