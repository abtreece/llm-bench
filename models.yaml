# Ollama tags benchmarked by harness/run.py.
# Order: smallest first so harness bugs surface quickly on cheap models.
# Endpoint: http://localhost:11434
#
# Selection rationale: javelin now has an NVIDIA Tesla T4 (16 GiB) and
# Ollama runs GPU-accelerated. The roster below was curated when the host
# was CPU-only (qwen2.5 instruct sizes that finished a 250-line Python
# file in under 10 minutes on CPU); it is kept as-is for comparability
# with the CPU-era runs. On the T4, larger or thinking models (qwen3,
# 30B+ with partial offload) may now be practical — revisit once
# comparison against the old baselines is no longer needed.
models:
  - name: qwen2.5:1.5b
    size_gb: 1.0
  - name: qwen2.5:3b
    size_gb: 1.9
  - name: qwen2.5:7b
    size_gb: 4.7
  - name: qwen2.5-coder:7b
    size_gb: 4.7
  - name: qwen2.5:14b
    size_gb: 9.0
