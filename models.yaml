# Ollama tags benchmarked by harness/run.py.
# Order: smallest first so harness bugs surface quickly on cheap models.
# Endpoint: http://localhost:11434
#
# Selection rationale: bench v2 orphaned the CPU-era baselines, so the
# old qwen2.5-only freeze no longer applies. The roster is the qwen2.5
# ladder plus thinking-capable models (qwen3:4b, deepseek-r1:14b) and a
# coder MoE (deepseek-coder-v2), all of which fit the T4's 16 GiB VRAM.
# qwen3-coder:30b (18 GB, partial CPU offload) was considered and
# deferred. Roster ratified 2026-06-12 ahead of the v2 baseline run.
models:
  - name: qwen2.5:1.5b
    size_gb: 1.0
  - name: qwen2.5:3b
    size_gb: 1.9
  - name: qwen3:4b
    size_gb: 2.5
  - name: qwen2.5:7b
    size_gb: 4.7
  - name: qwen2.5-coder:7b
    size_gb: 4.7
  - name: deepseek-coder-v2:latest
    size_gb: 8.9
  - name: qwen2.5:14b
    size_gb: 9.0
  - name: deepseek-r1:14b
    size_gb: 9.0
